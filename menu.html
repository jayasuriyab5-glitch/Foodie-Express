  {id:26,name:" Egg Rice",desc:"Egg fried rice",price:149,type:"nonveg",img:"https://images.pexels.com/photos/9980760/pexels-photo-9980760.jpeg"},

  {id:29,name:" Chicken Pizza",desc:"Chicken topping",price:279,type:"nonveg",img:"https://images.pexels.com/photos/31587565/pexels-photo-31587565.jpeg"},
  {id:30,name:" Combo Meal",desc:"Mushroom Noodeles+Chciken Manchurien",price:199,type:"veg",img:"https://images.pexels.com/photos/28445829/pexels-photo-28445829.jpeg"}
];
let cart = JSON.parse(localStorage.getItem('foodie_cart') || '{}');
let currentFilter = "all";

function formatINR(n){
  return "₹" + n;
}

function filterMenu(type){
  currentFilter = type;
  renderMenu();
}

function renderMenu(){
  const menuList = document.getElementById("menuList");
  menuList.innerHTML = "";

  MENU_ITEMS
  .filter(item => currentFilter==="all" || item.type===currentFilter)
  .forEach(item=>{
    const qty = cart[item.id] || 0;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.img}" style="width:100%;height:140px;object-fit:cover;border-radius:10px">

      <div class="card-title">${item.name}</div>
      <div class="card-meta">${item.desc}</div>

      <div class="card-bottom">
        <span class="price">${formatINR(item.price)}</span>

        <div class="qty-controls" data-id="${item.id}">
          <button class="btnMinus" ${qty===0?'disabled':''}>-</button>
          <span>${qty}</span>
          <button class="btnPlus">+</button>
        </div>
      </div>
    `;

    menuList.appendChild(card);
  });
}

function updateCart(){
  let totalItems = 0;
  let totalAmount = 0;

  for(const id in cart){
    const item = MENU_ITEMS.find(i=>i.id==id);
    totalItems += cart[id];
    totalAmount += item.price * cart[id];
  }

  document.getElementById("menuCartCount").innerText = totalItems;
  document.getElementById("cartCount").innerText = `(${totalItems})`;
  document.getElementById("cartTotal").innerText = "₹" + totalAmount;
}


function updateFloatingCart(){
  let total = 0;

  for(let id in cart){
    total += cart[id];
  }

  const box = document.getElementById("floatingCart");
  const count = document.getElementById("fcCount");

  if(total > 0){
    box.style.display = "flex";
    count.innerText = total + " item";
  } else {
    box.style.display = "none";
  }
}

/* CLICK */
document.getElementById("menuList").addEventListener("click", e=>{
  const wrap = e.target.closest(".qty-controls");
  if(!wrap) return;

  const id = wrap.dataset.id;

  if(e.target.classList.contains("btnPlus")){
    cart[id]=(cart[id]||0)+1;
  }

  if(e.target.classList.contains("btnMinus")){
    cart[id]=Math.max((cart[id]||0)-1,0);
    if(cart[id]===0) delete cart[id];
  }

  localStorage.setItem("foodie_cart", JSON.stringify(cart));

  renderMenu();
  updateCart();
  updateFloatingCart(); 
});

/* NAV CART */
function updateCart(){
  let total=0;
  for(let id in cart) total+=cart[id];
  document.getElementById("menuCartCount").innerText = total;
}

/* FLOATING CART */
function updateFloatingCart(){
  let total=0;
  for(let id in cart) total+=cart[id];

  const box = document.getElementById("floatingCart");
  const count = document.getElementById("fcCount");

  if(total>0){
    box.style.display="flex";
    count.innerText = total;
  }else{
    box.style.display="none";
  }
}

/* GO TO CART */
function goToCart(){
  window.location.href="cart.html";
}

/* INIT */
renderMenu();
updateCart();
updateFloatingCart();

</script>
